  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fdiv>\n          <div id=\"chat-scroll\" style=\"flex: 1 1 auto; overflow-y: auto; padding: 22px 20px; display: flex; flex-direction: column; gap: 18px;\">\n            <sc-if value=\"{{ noMessages }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n                <div style=\"font-size: 13px; letter-spacing: 0.04em; color: #8a847f;\">Try asking<\u002Fdiv>\n                <div style=\"display: flex; flex-wrap: wrap; gap: 8px;\">\n                  <sc-for list=\"{{ samples }}\" as=\"s\" hint-placeholder-count=\"4\">\n                    <button type=\"button\" onclick=\"{{ s.onClick }}\" style=\"text-align: left; border: 1px solid #e4e4e4; border-radius: 999px; padding: 10px 16px; background: transparent; cursor: pointer; font-family: inherit; font-size: 14px; color: #111111;\">{{ s.text }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-for list=\"{{ messages }}\" as=\"msg\" hint-placeholder-count=\"0\">\n              <sc-if value=\"{{ msg.isUser }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"align-self: flex-end; max-width: 82%; background: #f0efed; color: #111111; border-radius: 4px; padding: 12px 16px; font-size: 15px; line-height: 1.45;\">{{ msg.text }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ msg.isBot }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"align-self: flex-start; max-width: 94%; display: flex; flex-direction: column; gap: 14px;\">\n                  <p style=\"margin: 0; font-size: 15px; line-height: 1.55; color: #111111;\">{{ msg.short }}<\u002Fp>\n                  <sc-if value=\"{{ msg.hasCard }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"border-radius: 4px; overflow: hidden; background: {{ msg.cardGrad }}; color: #1a1a1a; padding: 22px; min-height: 170px; display: flex; flex-direction: column; justify-content: flex-end;\">\n                      <div style=\"font-size: 18px; font-weight: 400; letter-spacing: -0.01em; line-height: 1.2;\">{{ msg.cardTitle }}<\u002Fdiv>\n                      <div style=\"margin-top: 6px; font-size: 14px; line-height: 1.45; color: rgba(26,26,26,0.62);\">{{ msg.cardDesc }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ msg.hasExcerpt }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"border-left: 3px solid #cfcac4; padding: 2px 0 2px 16px;\">\n                      <div style=\"font-size: 16px; line-height: 1.5; color: #2a2620; font-style: italic;\">“{{ msg.excerptText }}”<\u002Fdiv>\n                      <div style=\"margin-top: 8px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: #8a847f;\">From {{ msg.excerptSource }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ msg.hasDigest }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"border: 1px solid #e4e4e4; border-radius: 10px; padding: 14px 16px;\">\n                      <div style=\"font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #8a847f;\">Digest<\u002Fdiv>\n                      <div style=\"margin-top: 6px; font-size: 16px; color: #111111;\">{{ msg.digestTitle }}<\u002Fdiv>\n                      <div style=\"margin-top: 10px; display: flex; flex-direction: column; gap: 8px;\">\n                        <sc-for list=\"{{ msg.digestItems }}\" as=\"d\" hint-placeholder-count=\"3\">\n                          <div style=\"display: flex; gap: 10px; font-size: 14px; line-height: 1.45; color: #3a3a3a;\"><span style=\"color: #b3aea9;\">—<\u002Fspan><span>{{ d }}<\u002Fspan><\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ msg.hasGuide }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"border: 1px solid #e4e4e4; border-radius: 10px; padding: 14px 16px;\">\n                      <div style=\"font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #8a847f;\">Recommended guide<\u002Fdiv>\n                      <div style=\"margin-top: 6px; font-size: 16px; color: #111111;\">{{ msg.guideTitle }}<\u002Fdiv>\n                      <div style=\"margin-top: 4px; font-size: 14px; color: #6e6862; line-height: 1.45;\">{{ msg.guideDesc }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ msg.hasTools }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div>\n                      <div style=\"font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #8a847f; margin-bottom: 8px;\">Related tools<\u002Fdiv>\n                      <div style=\"display: flex; flex-wrap: wrap; gap: 8px;\">\n                        <sc-for list=\"{{ msg.tools }}\" as=\"tool\" hint-placeholder-count=\"0\">\n                          <span style=\"border: 1px solid #e4e4e4; border-radius: 999px; padding: 7px 14px; font-size: 13px; color: #111111;\">{{ tool }}<\u002Fspan>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ msg.hasIntel }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"border: 1px solid #e4e4e4; border-radius: 10px; padding: 14px 16px;\">\n                      <div style=\"font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #8a847f;\">Relevant intel<\u002Fdiv>\n                      <div style=\"margin-top: 6px; font-size: 16px; color: #111111;\">{{ msg.intelTitle }}<\u002Fdiv>\n                      <div style=\"margin-top: 4px; font-size: 14px; color: #6e6862; line-height: 1.45;\">{{ msg.intelWhy }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ msg.hasSource }}\" hint-placeholder-val=\"{{ false }}\">\n                    <a href=\"#\" style=\"display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #111111; text-decoration: underline; text-underline-offset: 3px;\">Source: {{ msg.sourceTitle }} →<\u002Fa>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ msg.hasNext }}\" hint-placeholder-val=\"{{ false }}\">\n                    <button type=\"button\" onclick=\"{{ msg.askNext }}\" style=\"align-self: flex-start; text-align: left; border: 1px dashed #cfcac4; border-radius: 10px; padding: 10px 14px; background: transparent; cursor: pointer; font-family: inherit; font-size: 14px; color: #6e6862;\">Ask next: {{ msg.next }}<\u002Fbutton>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ thinking }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"align-self: flex-start; font-size: 15px; color: #8a847f;\">Thinking…<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"background: #ffffff; border-radius: 4px; box-shadow: 0 8px 28px rgba(40,20,12,0.10); display: flex; align-items: center; gap: 10px; padding: 8px 10px 8px 18px;\">\n        <button type=\"button\" class=\"iconbtn\" aria-label=\"Attach\" style=\"display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; padding: 0; border: none; background: transparent; cursor: pointer; flex: 0 0 auto;\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9a9a9a\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <input id=\"chat-input\" value=\"{{ chatDraft }}\" oninput=\"{{ onDraft }}\" onfocus=\"{{ openChat }}\" onkeydown=\"{{ onChatKey }}\" aria-label=\"Ask the TRIPTK assistant\" style=\"flex: 1 1 auto; min-width: 0; border: none; outline: none; background: transparent; font-family: inherit; font-size: 17px; color: #111111; padding: 10px 0;\">\n        <button type=\"button\" class=\"sendbtn\" aria-label=\"Send\" onclick=\"{{ sendChat }}\" style=\"display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 42px; padding: 0; border: none; border-radius: 4px; background: #1a1a1a; cursor: pointer; flex: 0 0 auto;\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 19V5\"><\u002Fpath><path d=\"M5 12l7-7 7 7\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Nav menu overlay (slides down from top; black) -->\n  <div style=\"{{ menuStyle }}\">\n    <div style=\"width: 100%; max-width: 1240px; margin: auto; display: flex; flex-wrap: wrap; gap: clamp(40px, 6vw, 96px);\">\n      <nav class=\"menunav\" style=\"display: flex; flex-direction: column; gap: clamp(2px, 0.6vw, 10px); flex: 1 1 340px;\">\n        <a class=\"menulink\" href=\"#\" style=\"font-size: clamp(32px, 4.4vw, 60px); letter-spacing: -0.03em; line-height: 1.12; font-weight: 400; color: #ffffff; text-decoration: none;\">About TRIPTK<\u002Fa>\n        <a class=\"menulink\" href=\"#\" style=\"font-size: clamp(32px, 4.4vw, 60px); letter-spacing: -0.03em; line-height: 1.12; font-weight: 400; color: #ffffff; text-decoration: none;\">Tools &amp; Frameworks<\u002Fa>\n        <a class=\"menulink\" href=\"#\" style=\"font-size: clamp(32px, 4.4vw, 60px); letter-spacing: -0.03em; line-height: 1.12; font-weight: 400; color: #ffffff; text-decoration: none;\">How We Work<\u002Fa>\n        <a class=\"menulink\" href=\"#\" style=\"font-size: clamp(32px, 4.4vw, 60px); letter-spacing: -0.03em; line-height: 1.12; font-weight: 400; color: #ffffff; text-decoration: none;\">Industry Intel<\u002Fa>\n      <\u002Fnav>\n\n      <div style=\"flex: 1 1 420px; max-width: 540px;\">\n        <p style=\"margin: 0 0 30px 0; font-size: 18px; line-height: 1.5; color: rgba(255,255,255,0.66); max-width: 430px;\">A searchable internal platform that helps the TRIPTK team work &amp; learn.<\u002Fp>\n        <sc-for list=\"{{ menuFeatured }}\" as=\"f\" hint-placeholder-count=\"3\">\n          <a href=\"#\" class=\"featrow\" style=\"display: flex; align-items: center; gap: 20px; padding: 18px 0; border-top: 1px solid rgba(255,255,255,0.14); text-decoration: none;\">\n            <div style=\"flex: 0 0 auto; width: 88px; height: 66px; border-radius: 6px; overflow: hidden; background: {{ f.grad }};\"><\u002Fdiv>\n            <div style=\"flex: 1 1 auto; min-width: 0;\">\n              <div style=\"font-size: 14px; color: #8f8f8f;\">{{ f.label }}<\u002Fdiv>\n              <div style=\"margin-top: 4px; font-size: 18px; line-height: 1.25; color: #ffffff; text-wrap: pretty;\">{{ f.title }}<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"flex: 0 0 auto; display: inline-flex; color: #ffffff;\">\n              <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n            <\u002Fspan>\n          <\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { menuOpen: false, chatOpen: false, draft: \"\", messages: [], thinking: false, locked: true, gatePass: \"\", showPass: false, gateError: false };\n\n  componentDidMount() {\n    this._clock = setInterval(() => this.forceUpdate(), 30000);\n    document.body.style.overflow = \"hidden\"; // prototype: always show the gate on load\n    this.setupReveal();\n    this.initPlaceholder();\n    this._onKey = (e) => { if (e.key === \"Escape\") this.closeMenu(); };\n    window.addEventListener(\"keydown\", this._onKey);\n  }\n\n  // Smoothly fade the page background to #472218 around the first row of grid cards.\n  setBgFade() {\n    const page = document.getElementById(\"page\");\n    const grid = document.querySelector('section[data-screen-label=\"Browse grid\"]');\n    if (!page || !grid) { this._bgRetry = setTimeout(() => this.setBgFade(), 150); return; }\n    const apply = () => {\n      const card = grid.querySelector(\"a.gcard\");\n      const ref = card || grid;\n      const center = ref.getBoundingClientRect().top + window.scrollY + (card ? card.offsetHeight * 0.5 : 220);\n      const a = Math.max(0, Math.round(center - 380));\n      const b = Math.round(center + 380);\n      page.style.backgroundColor = \"#472218\";\n      page.style.backgroundImage = \"linear-gradient(to bottom, #ffffff 0px, #ffffff \" + a + \"px, rgba(255,255,255,0) \" + b + \"px)\";\n      page.style.backgroundRepeat = \"no-repeat\";\n    };\n    apply();\n    this._bgResize = () => { clearTimeout(this._bgT); this._bgT = setTimeout(apply, 150); };\n    window.addEventListener(\"resize\", this._bgResize);\n  }\n  componentWillUnmount() {\n    if (this._clock) clearInterval(this._clock);\n    if (this._ph && this._ph.timer) clearTimeout(this._ph.timer);\n    if (this._revealRetry) clearTimeout(this._revealRetry);\n    if (this._revealCleanup) this._revealCleanup();\n    if (this._onKey) window.removeEventListener(\"keydown\", this._onKey);\n    if (this._bgRetry) clearTimeout(this._bgRetry);\n    if (this._bgResize) window.removeEventListener(\"resize\", this._bgResize);\n    if (this._phT) clearTimeout(this._phT);\n    if (this._phRetry) clearTimeout(this._phRetry);\n  }\n\n  submitGate() {\n    if ((this.state.gatePass || \"\").trim().toLowerCase() === \"legendary\") {\n      document.body.style.overflow = \"\";\n      const g = document.getElementById(\"gate\");\n      if (g) g.style.transform = \"translateY(100%)\";\n      this.setState({ gateError: false });\n      setTimeout(() => this.setState({ locked: false }), 700);\n    } else {\n      this.setState({ gateError: true });\n    }\n  }\n  toggleShowPass() { this.setState({ showPass: !this.state.showPass }); }\n\n  openMenu() { this.setState({ menuOpen: true }); document.body.style.overflow = \"hidden\"; }\n  closeMenu() { this.setState({ menuOpen: false }); document.body.style.overflow = \"\"; }\n  spreadNav(open) {\n    const icon = document.querySelector('header[data-screen-label=\"Header\"] img');\n    const btn = document.querySelector('header[data-screen-label=\"Header\"] button[aria-label=\"Menu\"]');\n    const shift = Math.round(Math.max(0, (window.innerWidth / 2) - 64));\n    if (icon) icon.style.transform = open ? \"translateX(-\" + shift + \"px)\" : \"translateX(0)\";\n    if (btn) btn.style.transform = open ? \"translateX(\" + shift + \"px)\" : \"translateX(0)\";\n  }\n\n  // Cards float in gracefully as they enter the viewport (subtle, with a light cascade).\n  setupReveal() {\n    let wraps = [...document.querySelectorAll('section[data-screen-label=\"Browse grid\"] .reveal')];\n    if (!wraps.length) { this._revealRetry = setTimeout(() => this.setupReveal(), 120); return; }\n    wraps.forEach((w, i) => { w.dataset.ri = i; });\n    const reduce = window.matchMedia && window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\n    if (reduce) { wraps.forEach((w) => w.classList.add(\"in\")); return; }\n    let pending = wraps.slice();\n    const check = () => {\n      const vh = window.innerHeight || document.documentElement.clientHeight;\n      pending = pending.filter((w) => {\n        const r = w.getBoundingClientRect();\n        if (r.top < vh * 0.9) {\n          const idx = Number(w.dataset.ri || 0);\n          w.style.transitionDelay = ((idx % 4) * 70) + \"ms\";\n          w.classList.add(\"in\");\n          return false;\n        }\n        return true;\n      });\n      if (!pending.length && this._revealCleanup) this._revealCleanup();\n    };\n    let ticking = false;\n    const onScroll = () => {\n      if (ticking) return;\n      ticking = true;\n      requestAnimationFrame(() => { ticking = false; check(); });\n    };\n    window.addEventListener(\"scroll\", onScroll, { passive: true });\n    window.addEventListener(\"resize\", onScroll);\n    this._revealCleanup = () => {\n      window.removeEventListener(\"scroll\", onScroll);\n      window.removeEventListener(\"resize\", onScroll);\n    };\n    check();\n  }\n\n  // Typewriter: auto-types/deletes sample prompts in the chat bar while idle.\n  initPlaceholder() {\n    const el = document.getElementById(\"chat-input\");\n    if (!el) { this._phRetry = setTimeout(() => this.initPlaceholder(), 150); return; }\n    const prompts = [\n      \"How do we scope qualitative research?\",\n      \"What framework should I use for a positioning project?\",\n      \"What are we seeing in healthcare right now?\",\n      \"Show me examples of strong strategy outputs.\",\n      \"How should I prepare for a client presentation?\",\n    ];\n    const s = { qi: 0, ci: 0, deleting: false };\n    const active = () => document.activeElement !== el && (el.value || \"\") === \"\";\n    const set = (t) => el.setAttribute(\"placeholder\", t);\n    const tick = () => {\n      if (!active()) { this._phT = setTimeout(tick, 400); return; }\n      const q = prompts[s.qi];\n      if (!s.deleting) {\n        s.ci++; set(q.slice(0, s.ci));\n        if (s.ci >= q.length) { s.deleting = true; this._phT = setTimeout(tick, 1700); return; }\n        this._phT = setTimeout(tick, 52 + Math.random() * 46);\n      } else {\n        s.ci--; set(q.slice(0, Math.max(0, s.ci)));\n        if (s.ci <= 0) { s.deleting = false; s.qi = (s.qi + 1) % prompts.length; this._phT = setTimeout(tick, 320); return; }\n        this._phT = setTimeout(tick, 26);\n      }\n    };\n    el.addEventListener(\"focus\", () => { s.ci = 0; s.deleting = false; set(\"Ask me anything…\"); });\n    set(\"\");\n    tick();\n  }\n\n  openChat() { this.setState({ chatOpen: true }); }\n  closeChat() { this.setState({ chatOpen: false }); }\n\n  scrollChat() {\n    setTimeout(() => { const el = document.getElementById(\"chat-scroll\"); if (el) el.scrollTop = el.scrollHeight; }, 40);\n  }\n\n  send() {\n    const t = (this.state.draft || \"\").trim();\n    if (!t) return;\n    this.setState({ draft: \"\" });\n    this._respond(t);\n  }\n  sendText(t) { this._respond(t); }\n  _respond(text) {\n    const userMsg = { isUser: true, isBot: false, text: text };\n    this.setState((s) => ({ messages: [...s.messages, userMsg], thinking: true, chatOpen: true }));\n    this.scrollChat();\n    setTimeout(() => {\n      const reply = this.answer(text);\n      this.setState((s) => ({ messages: [...s.messages, reply], thinking: false }));\n      this.scrollChat();\n    }, 760);\n  }\n\n  // Modular assistant answer — site content only, with a fallback when nothing matches.\n  mk(o) {\n    return {\n      isUser: false, isBot: true,\n      short: o.short || \"\",\n      hasGuide: !!o.guide, guideTitle: o.guide ? o.guide.title : \"\", guideDesc: o.guide ? o.guide.desc : \"\",\n      hasCard: !!o.card, cardTitle: o.card ? o.card.title : \"\", cardDesc: o.card ? o.card.desc : \"\", cardGrad: o.card ? (o.card.grad || \"radial-gradient(120% 92% at 50% -12%, #5db786 0%, #d2ecdf 46%, #f1f4f2 100%)\") : \"
